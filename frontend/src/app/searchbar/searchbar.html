<nav class="nav-bar">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <span class="logo-talkie">Talkie</span><span class="logo-search">Search</span>
    </a>

    <div class="search-box-wrapper">
      <div class="search-box">
        <div class="search-context">
          <select [(ngModel)]="searchType" (change)="setSearchType(searchType)">
            <option value="all">All</option>
            <option value="movie">Titles</option>
            <option value="director">Directors</option>
            <option value="actor">Actors</option>
            <option value="keyword">Genres</option>
          </select>
          <div class="vertical-divider"></div>
        </div>

        <div class="search-input-wrap">
          <input type="text" [(ngModel)]="searchQuery" (input)="onInput()" (focus)="onFocus()" (keyup.enter)="search()"
            placeholder="Search movies, cast, genres..." />
        </div>

        <button type="button" class="search-action" (click)="search()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
      <div *ngIf="error()" class="search-status is-error">
        <span class="status-msg">{{ error() }}</span>
      </div>
      <div class="results-dropdown" *ngIf="showDropdown() && (results().length > 0 || loading())">

        <div class="dropdown-list skeleton-list" *ngIf="loading()">
          <div class="dropdown-item skeleton-item" *ngFor="let i of [1,2,3,4,5]">
            <div class="item-content">
              <div class="item-main w-full">
                <div class="skeleton-title"></div>
                <div class="skeleton-sub"></div>
              </div>
              <div class="skeleton-score"></div>
            </div>
          </div>
        </div>

        <div class="dropdown-list" *ngIf="!loading()">
          <div class="dropdown-list">
            <button *ngFor="let movie of results(); let i = index" class="dropdown-item" type="button"
              (click)="selectMovie(movie)">
              <div class="item-content">
                <div class="item-main">
                
                  <span class="movie-title" [innerHTML]="getDisplayTitle(movie)"></span>

                  <div class="movie-sub">
                    <span>{{ (movie.director && movie.director[0]) || 'N/A' }}</span>
                    <span class="sep" *ngIf="movie.genres?.length">•</span>
                    <span class="year">{{ (movie.genres || []).slice(0,2).join(', ') }}</span>
                  </div>

                  <div class="movie-highlights" *ngIf="getAdditionalHighlights(movie).length > 0">
                    <div *ngFor="let highlight of getAdditionalHighlights(movie)" class="highlight-tag">
                      <span class="highlight-label">{{ highlight.type }}:</span>
                      <span class="highlight-value" [innerHTML]="highlight.html"></span>
                    </div>
                  </div>
                </div>

                <div class="item-score">
                  <svg class="star-icon" viewBox="0 0 24 24">
                    <path
                      d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                  </svg>
                  <span>{{ movie.imdb_rating != null ? movie.imdb_rating : '--' }}</span>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <div class="nav-right-placeholder"></div>
    </div>
  </div>
</nav>
